<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Panier - Adis'tyle</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/panier.css"> 
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light" style="background-color: #ffffff !important; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);">
            <div class="container-fluid header-container">
                <a class="navbar-brand logo" href="../index.html">
                    <img src="../image/logo-removebg-preview.png" alt="Logo Adis'tyle">
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="../index.html">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="./produits.html">Produits</a></li>
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="./panier.html">Panier</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="panier-section">
            <h1>Votre Panier</h1>

            <div class="panier-liste" id="panier-liste-articles">
                
                <div class="panier-article" data-id="1">
                    <img src="../image/produit-robe-noire.jpg" alt="Robe Africaine Noire et Or">
                    <div class="article-details">
                        <p class="article-nom">Robe Chic Dorée</p>
                        <p class="article-prix" data-prix="75.00">75,00 CFA</p>
                    </div>
                    <div class="article-quantite">
                        <button class="quantite-btn" data-id="1" data-action="decrement">-</button>
                        <input type="number" value="1" min="1" class="quantite-input" data-id="1" readonly>
                        <button class="quantite-btn" data-id="1" data-action="increment">+</button>
                    </div>
                    <div class="article-total">75,00 CFA</div> 
                    <button class="article-supprimer" data-id="1">Supprimer</button>
                </div>
                
            </div>

            <div class="panier-recapitulatif">
                <h2>Récapitulatif de la commande</h2>
                <div class="recap-ligne">
                    <span>Sous-total :</span>
                    <span id="sous-total">0,00 CFA</span>
                </div>
                <div class="recap-ligne">
                    <span>Livraison :</span>
                    <span id="frais-livraison">5,00 CFA</span> 
                </div>
                <hr>
                <div class="recap-ligne total">
                    <span>Total à payer :</span>
                    <span id="total-final">5,00 CFA</span>
                </div>
                
                <button class="btn-checkout">Passer à la caisse</button>
            </div>
            
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>

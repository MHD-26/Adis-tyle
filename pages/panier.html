<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Panier - Adis'tyle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/panier.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light"
            style="background-color: #ffffff !important; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);">
            <div class="container-fluid header-container">
                <a class="navbar-brand logo" href="../index.html">
                    <img src="../image/logo-removebg-preview.png" alt="Logo Adis'tyle">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="../index.html">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="./produits.html">Produits</a></li>
                        <li class="nav-item"><a class="nav-link active" aria-current="page"
                                href="./panier.html">Panier</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="panier-section">
            <h1>Votre Panier</h1>

            <div class="panier-liste" id="panier-liste-articles">

                <div class="panier-article" data-id="1">
                    <img src="../image/produit-robe-noire.jpg" alt="Robe Africaine Noire et Or">
                    <div class="article-details">
                        <p class="article-nom">Robe Chic Dorée</p>
                        <p class="article-prix" data-prix="75.00">75,00 CFA</p>
                    </div>
                    <div class="article-quantite">
                        <button class="quantite-btn" data-id="1" data-action="decrement">-</button>
                        <input type="number" value="1" min="1" class="quantite-input" data-id="1" readonly>
                        <button class="quantite-btn" data-id="1" data-action="increment">+</button>
                    </div>
                    <div class="article-total">75,00 CFA</div>
                    <button class="article-supprimer" data-id="1">Supprimer</button>
                </div>

            </div>

            <div class="panier-recapitulatif">
                <h2>Récapitulatif de la commande</h2>
                <div class="recap-ligne">
                    <span>Sous-total :</span>
                    <span id="sous-total">0,00 CFA</span>
                </div>
                <div class="recap-ligne">
                    <span>Livraison :</span>
                    <span id="frais-livraison">2000,00 CFA</span>
                </div>
                <hr>
                <div class="recap-ligne total">
                    <span>Total à payer :</span>
                    <span id="total-final">2000,00 CFA</span>
                </div>

                <button class="btn-checkout" data-bs-toggle="modal" data-bs-target="#checkoutModal">Passer à la commande</button>
            </div>
        </section>
    </main>

    <!-- Modal Checkout -->
    <div class="modal fade" id="checkoutModal" tabindex="-1" aria-labelledby="checkoutModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="checkoutModalLabel">Informations de livraison</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="checkoutForm">
              <div class="mb-3">
                <label for="clientName" class="form-label">Prénom et Nom</label>
                <input type="text" class="form-control" id="clientName" required>
              </div>
              <div class="mb-3">
                <label for="clientPhone" class="form-label">Numéro de téléphone</label>
                <input type="tel" class="form-control" id="clientPhone" required>
              </div>
              <div class="mb-3">
                <label for="clientAddress" class="form-label">Adresse exacte de livraison</label>
                <textarea class="form-control" id="clientAddress" rows="2" required></textarea>
              </div>
              <div class="mb-3">
                <label for="clientDate" class="form-label">Date attendue pour la livraison</label>
                <input type="date" class="form-control" id="clientDate" required>
                <div class="form-text text-primary fst-italic">Note : La livraison se fera au maximum 5 jours après la commande.</div>
              </div>
              <div class="mb-3">
                <label for="clientPayment" class="form-label">Mode de paiement</label>
                <select class="form-select" id="clientPayment" required>
                  <option value="Paiement à la livraison">Paiement à la livraison (Espèces)</option>
                  <option value="Wave">Wave</option>
                  <option value="Orange Money">Orange Money</option>
                </select>
              </div>
              
              <!-- Champ caché par défaut, qui s'affiche pour Wave/Orange Money -->
              <div class="mb-3 d-none" id="transactionField">
                <div class="alert alert-warning p-2 small mb-2" id="paymentInstructions">
                    <!-- Les instructions de paiement seront insérées ici par Javascript -->
                </div>
                <label for="transactionCode" class="form-label">Numéro de transaction</label>
                <input type="text" class="form-control" id="transactionCode" placeholder="Ex: CI230501.1420.A123">
              </div>

              <button type="submit" class="btn btn-success w-100 fw-bold" style="background-color: #25D366; border: none;">Envoyer la commande sur WhatsApp</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>

</html>
